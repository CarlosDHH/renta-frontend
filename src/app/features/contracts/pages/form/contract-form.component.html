<div class="page-container">
  <p-toast />

  <div class="page-header">
    <div class="header-left">
      <p-button icon="pi pi-arrow-left" [text]="true" (onClick)="goBack()" />
      <h2>Nuevo contrato</h2>
    </div>
  </div>

  <div class="form-card">
    @if (loadingOptions()) {
      <div class="loading-options">
        <i class="pi pi-spin pi-spinner"></i>
        <span>Cargando clientes y planes...</span>
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-grid">

          <div class="field full-width">
            <label>Cliente</label>
            <p-select
              formControlName="customerId"
              [options]="customers()"
              optionLabel="label"
              optionValue="value"
              placeholder="Selecciona un cliente"
              [filter]="true"
              filterPlaceholder="Buscar cliente..."
              styleClass="w-full"
            />
            @if (form.get('customerId')?.invalid && form.get('customerId')?.touched) {
              <small class="error-msg">El cliente es requerido</small>
            }
          </div>

          <div class="field full-width">
            <label>Plan</label>
            <p-select
              formControlName="planId"
              [options]="plans()"
              optionLabel="label"
              optionValue="value"
              placeholder="Selecciona un plan"
              [filter]="true"
              filterPlaceholder="Buscar plan..."
              styleClass="w-full"
            />
            @if (form.get('planId')?.invalid && form.get('planId')?.touched) {
              <small class="error-msg">El plan es requerido</small>
            }
          </div>

          <div class="field">
            <label>Fecha de inicio <span class="optional">(opcional, default: hoy)</span></label>
            <input pInputText type="date" formControlName="startDate" class="w-full" />
          </div>

        </div>

        <div class="form-actions">
          <p-button label="Cancelar" [outlined]="true" (onClick)="goBack()" />
          <p-button
            type="submit"
            label="Crear contrato"
            [loading]="loading()"
            [disabled]="form.invalid"
          />
        </div>
      </form>
    }
  </div>
</div>
