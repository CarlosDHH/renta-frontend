<header
  class="fixed top-0 w-full z-50 transition-all duration-300"
  [class.bg-white]="scrolled()"
  [class.shadow-sm]="scrolled()"
  [class.bg-transparent]="!scrolled()"
>
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="#hero" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
        <i class="pi pi-wifi text-white text-base"></i>
      </div>
      <span class="font-black text-xl tracking-tight text-slate-900" style="font-family: 'Manrope', sans-serif">
        {{ content().companyName }}
      </span>
    </a>

    <nav class="hidden md:flex items-center gap-8">
      <a href="#services" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition-colors">Servicios</a>
      <a href="#products" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition-colors">Productos</a>
      <a href="#news" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition-colors">Novedades</a>
      <a href="#contact" class="text-sm font-semibold text-slate-600 hover:text-blue-600 transition-colors">Contacto</a>
    </nav>

    <div class="hidden md:flex items-center gap-3">
      <a routerLink="/auth/login" class="text-sm font-semibold text-slate-600 hover:text-blue-700 transition-colors px-4 py-2">
        Iniciar sesión
      </a>
      <a href="#contact" class="text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-lg transition-colors shadow-sm">
        Solicitar servicio
      </a>
    </div>

    <button class="md:hidden p-2 text-slate-600" (click)="toggleMenu()">
      <i [class]="menuOpen() ? 'pi pi-times text-xl' : 'pi pi-bars text-xl'"></i>
    </button>
  </div>

  @if (menuOpen()) {
    <div class="md:hidden bg-white border-t border-slate-100 px-6 py-4 space-y-3 shadow-lg">
      <a href="#services" class="block text-sm font-semibold text-slate-700 py-2" (click)="toggleMenu()">Servicios</a>
      <a href="#products" class="block text-sm font-semibold text-slate-700 py-2" (click)="toggleMenu()">Productos</a>
      <a href="#news" class="block text-sm font-semibold text-slate-700 py-2" (click)="toggleMenu()">Novedades</a>
      <a href="#contact" class="block text-sm font-semibold text-slate-700 py-2" (click)="toggleMenu()">Contacto</a>
      <div class="pt-2 border-t border-slate-100 flex flex-col gap-2">
        <a routerLink="/auth/login" class="text-sm font-semibold text-slate-600 py-2 text-center" (click)="toggleMenu()">Iniciar sesión</a>
        <a href="#contact" class="text-sm font-bold text-white bg-blue-600 px-5 py-3 rounded-lg text-center" (click)="toggleMenu()">Solicitar servicio</a>
      </div>
    </div>
  }
</header>
