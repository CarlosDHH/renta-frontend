<div class="page-container">
  <p-toast />
  <p-confirmDialog />

  <div class="page-header">
    <h2>Planes</h2>
    <p-button label="Nuevo plan" icon="pi pi-plus" (onClick)="goToCreate()" />
  </div>

  <div class="filters-bar">
    <input
      pInputText
      type="text"
      placeholder="Buscar por nombre o descripción..."
      [(ngModel)]="searchTerm"
      (keyup.enter)="onSearch()"
      class="search-input"
    />
    <p-button icon="pi pi-search" (onClick)="onSearch()" [outlined]="true" />
    <p-select
      [(ngModel)]="activeFilter"
      [options]="activeOptions"
      optionLabel="label"
      optionValue="value"
      (onChange)="onFilterChange()"
      styleClass="filter-select"
    />
  </div>

  <p-table
    [value]="plans()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="limit"
    [totalRecords]="totalRecords()"
    [lazy]="true"
    (onPage)="onPageChange($event)"
    [rowsPerPageOptions]="[10, 20, 50]"
    styleClass="p-datatable-sm"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Velocidad</th>
        <th>Precio</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-plan>
      <tr>
        <td><strong>{{ plan.name }}</strong></td>
        <td>{{ plan.mbps }} Mbps</td>
        <td>{{ formatPrice(plan.price) }}</td>
        <td>{{ plan.description ?? '—' }}</td>
        <td>
          <p-tag
            [value]="plan.active ? 'Activo' : 'Inactivo'"
            [severity]="getStatusSeverity(plan.active)"
          />
        </td>
        <td>
          <div class="actions">
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="info"
              (onClick)="goToEdit(plan.id)"
            />
            <p-button
              icon="pi pi-trash"
              [rounded]="true"
              [text]="true"
              severity="danger"
              (onClick)="confirmDelete(plan)"
            />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="empty">
      <tr>
        <td colspan="6" class="empty-message">No se encontraron planes</td>
      </tr>
    </ng-template>
  </p-table>
</div>
